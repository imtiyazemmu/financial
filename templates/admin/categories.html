<!DOCTYPE html>
<html>
<head>
    <title>Manage Categories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container"><span class="navbar-brand">🏷️ Categories</span><a href="/admin" class="btn btn-outline-light">⬅ Back</a></div>
    </nav>
    <div class="container mt-4">
        <div class="d-flex justify-content-between"><h3>All Categories</h3><a href="/admin/category/new" class="btn btn-primary">+ New Category</a></div>
        <table class="table table-bordered mt-3">
            <thead><tr><th>#</th><th>Name</th><th>Slug</th><th>Actions</th></tr></thead>
            <tbody>
                {% for cat in categories %}
                <tr><td>{{ cat.id }}</td><td>{{ cat.name }}</td><td>{{ cat.slug }}</td>
                    <td><a href="/admin/category/{{ cat.id }}/delete" class="btn btn-sm btn-danger" onclick="return confirm('Delete this category?')">Delete</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
