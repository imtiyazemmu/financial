<!DOCTYPE html>
<html>
<head>
    <title>Settings & Ads</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand">⚙️ Settings & AdSense</span>
            <a href="/admin" class="btn btn-outline-light">⬅ Back</a>
        </div>
    </nav>
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8 mx-auto">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h5>📢 Google AdSense Code Management</h5>
                    </div>
                    <div class="card-body">
                        <form method="POST">
                            <div class="mb-3">
                                <label class="form-label">🔹 Header Ad (Top Banner)</label>
                                <textarea name="ads_header" class="form-control" rows="3" placeholder="AdSense Code here...">{{ settings.get('ads_header', '') }}</textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">🔹 In-Article Ad (Content के बीच)</label>
                                <textarea name="ads_in_article" class="form-control" rows="3" placeholder="AdSense Code here...">{{ settings.get('ads_in_article', '') }}</textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">🔹 Sidebar Ad (Right Column)</label>
                                <textarea name="ads_sidebar" class="form-control" rows="3" placeholder="AdSense Code here...">{{ settings.get('ads_sidebar', '') }}</textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">🔹 Footer Ad (Bottom)</label>
                                <textarea name="ads_footer" class="form-control" rows="3" placeholder="AdSense Code here...">{{ settings.get('ads_footer', '') }}</textarea>
                            </div>
                            <button type="submit" class="btn btn-success w-100">💾 Save All Settings</button>
                        </form>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">🔑 Google AdSense Client ID (Verification)</label>
                        <input type="text" name="adsense_verification" class="form-control" 
                            placeholder="ca-pub-xxxxxxxxxxxxxxxx" 
                            value="{{ settings.get('adsense_verification', '') }}">
                        <small class="text-muted">यहाँ सिर्फ Client ID डालें (जैसे: ca-pub-1234567890)</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
