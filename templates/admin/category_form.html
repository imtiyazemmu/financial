<!DOCTYPE html>
<html>
<head>
    <title>New Category</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark"><div class="container"><span class="navbar-brand">➕ New Category</span><a href="/admin/categories" class="btn btn-outline-light">Back</a></div></nav>
    <div class="container mt-4">
        <form method="POST">
            <div class="mb-3"><label>Name *</label><input type="text" name="name" class="form-control" required></div>
            <div class="mb-3"><label>Slug (Auto-generate if empty)</label><input type="text" name="slug" class="form-control" placeholder="my-category"></div>
            <button type="submit" class="btn btn-success">Save Category</button>
        </form>
    </div>
</body>
</html>
